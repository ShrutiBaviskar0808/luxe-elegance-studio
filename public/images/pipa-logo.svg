<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">PIPA Jewellery</title>
  <desc id="desc">PIPA Jewellery wordmark</desc>
  <style>
    .wordmark {
      fill: #1a1a1a;
      font-family: "Italiana", "Cormorant Garamond", "Times New Roman", serif;
      font-weight: 400;
      text-anchor: middle;
    }
    .submark {
      fill: #1a1a1a;
